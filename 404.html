<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Dott.ssa Francesca Armellini - Fisioterapista</title>
  <script type="text/javascript">
    (function () {
      var l = window.location;

      // Dynamic: 1 segment to keep on github.io (the repo name), 0 on custom domains
      var pathSegmentsToKeep = l.hostname.endsWith("github.io") ? 1 : 0;

      var newUrl =
        l.protocol +
        "//" +
        l.hostname +
        (l.port ? ":" + l.port : "") +
        l.pathname
          .split("/")
          .slice(0, 1 + pathSegmentsToKeep)
          .join("/") +
        "/?/" +
        l.pathname
          .slice(1)
          .split("/")
          .slice(pathSegmentsToKeep)
          .join("/")
          .replace(/&/g, "~and~") +
        (l.search
          ? "&" + l.search.slice(1).replace(/&/g, "~and~")
          : "") +
        l.hash;

      l.replace(newUrl);
    })();
  </script>
</head>

<body></body>

</html>
