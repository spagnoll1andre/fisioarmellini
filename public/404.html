<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Dott.ssa Francesca Armellini - Fisioterapista</title>
    <script type="text/javascript">
      // SPA redirect for GitHub Pages with custom domain (pathSegmentsToKeep = 0)
      // Converts /blog/slug → /?/blog/slug so index.html is served,
      // then the decode script in index.html restores the correct path.
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
